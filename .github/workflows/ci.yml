name: Python CI

on:
  push:
    branches:
      - main

jobs:
  playwright-tests:
    name: Playwright Tests
    runs-on: ubuntu-latest

    env:
      LT_TUNNEL_NAME: github-${{ github.run_id }}

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install uv
      - name: Install uv
        run: pip install uv

      # Install project dependencies
      - name: Install Project Dependencies
        run: uv sync

      # Verify installation
      - name: Verify Python
        run: python --version

      - name: Verify uv
        run: uv --version

      - name: Verify Pytest
        run: uv run pytest --version

      # Start the local website
      - name: Start Local Web Server
        run: |
          python -m http.server 3000 &
          echo "Local server started."

      # Wait for the server
      - name: Wait for Server
        run: sleep 5

      # Verify the server
      - name: Verify Server
        run: curl http://localhost:3000

      # Start LambdaTest Tunnel
      - name: Start LambdaTest Tunnel
        uses: LambdaTest/LambdaTest-tunnel-action@v2
        with:
          user: ${{ secrets.LT_USERNAME }}
          accessKey: ${{ secrets.LT_ACCESS_KEY }}
          tunnelName: ${{ env.LT_TUNNEL_NAME }}

      - name: Wait for Tunnel
        run: sleep 10

      # Run Playwright tests
      - name: Run Pytest
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
          LT_TUNNEL_NAME: ${{ env.LT_TUNNEL_NAME }}
        run: uv run pytest -n auto -v